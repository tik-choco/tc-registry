name: Auto Add App PR

on:
  issues:
    types: [opened]

jobs:
  add-app:
    if: startsWith(github.event.issue.title, 'Add app:')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    env:
      BRANCH_NAME: chore/add-app-${{ github.event.issue.number }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Create branch
        run: git checkout -b "${{ env.BRANCH_NAME }}"
      - name: Update apps.json
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: node scripts/add-app.js
      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps.json
          git diff --quiet --cached || (
            git commit -m "Add app from Issue #${{ github.event.issue.number }}" &&
            git push --set-upstream origin "${{ env.BRANCH_NAME }}"
          )
      - name: Create Pull Request
        uses: actions/github-script@v7
        with:
          script: |
            const branch = process.env.BRANCH_NAME;
            const body = context.payload.issue.body || '';

            function extractField(text, label) {
              const lines = text.replace(/\r\n/g, '\n').split('\n');

              for (let i = 0; i < lines.length; i += 1) {
                const trimmed = lines[i].trim();
                if (!trimmed) continue;

                if (trimmed === `### ${label}` || trimmed === `## ${label}` || trimmed === `${label}:`) {
                  for (let j = i + 1; j < lines.length; j += 1) {
                    const next = lines[j].trim();
                    if (next) return next;
                  }
                }
              }

              return null;
            }

            const appName = extractField(body, 'App name');
            const title = appName ? `Add ${appName}` : `Add app from Issue #${context.payload.issue.number}`;

            try {
              await github.rest.pulls.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                head: branch,
                base: 'main',
                body: `Closes #${context.payload.issue.number}`,
              });
            } catch (error) {
              if (error.status === 422) {
                core.info('Pull request already exists.');
                return;
              }
              throw error;
            }
