name: "アプリ追加申請"
description: "新しいWebアプリをレジストリに追加します"
title: "アプリ追加: "
labels:
  - app-add

body:
  - type: markdown
    attributes:
      value: "以下のフォームに入力すると、自動的に `apps.json` が更新されます。"
  - type: input
    id: title
    attributes:
      label: "アプリ名"
      description: "例: Awesome App"
    validations:
      required: true
  - type: input
    id: url
    attributes:
      label: "URL"
      description: "例: https://example.com"
    validations:
      required: true
